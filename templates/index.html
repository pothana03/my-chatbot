<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy Chatbot</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 600px;
            background: #16213e;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .chat-header {
            background: #0f3460;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
        }

            .chat-header span {
                color: #e94560;
            }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            color: white;
            font-size: 14px;
            line-height: 1.5;
        }

        .user-message {
            background: #e94560;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: #0f3460;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-input {
            display: flex;
            padding: 16px;
            background: #0f3460;
            gap: 10px;
        }

            .chat-input input {
                flex: 1;
                padding: 12px 16px;
                border: none;
                border-radius: 25px;
                outline: none;
                background: #1a1a2e;
                color: white;
                font-size: 14px;
            }

            .chat-input button {
                padding: 12px 20px;
                border: none;
                border-radius: 25px;
                background: #e94560;
                color: white;
                cursor: pointer;
                font-weight: bold;
            }

                .chat-input button:hover {
                    background: #c73652;
                }
    </style>
</head>

<body>

    <div class="chat-container">

        <div class="chat-header">
            🤖 <span>Buddy</span> AI Assistant
        </div>

        <div class="chat-messages" id="chatMessages">

            <div class="message bot-message">
                Hi! I'm Buddy, your personal AI assistant 😊
            </div>

        </div>

        <div class="chat-input">

            <input type="text"
                   id="userInput"
                   placeholder="Type a message..."
                   autocomplete="off">

            <button type="button" onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

    <script>

        const input = document.getElementById("userInput");
        const messages = document.getElementById("chatMessages");

        // Enter key support
        input.addEventListener("keydown", function(event){

            if(event.key === "Enter"){
                event.preventDefault();
                sendMessage();
            }

        });

        // Append message
        function appendMessage(text, className){

            const div = document.createElement("div");

            div.className = "message " + className;

            div.innerText = text;

            messages.appendChild(div);

            messages.scrollTop = messages.scrollHeight;
        }

        // Send message
        async function sendMessage(){

            const userText = input.value.trim();

            if(userText === ""){
                return;
            }

            // Show user message
            appendMessage(userText, "user-message");

            // Clear input
            input.value = "";

            try{

                const response = await fetch("/chat", {

                    method: "POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body: JSON.stringify({
                        message: userText
                    })

                });

                const data = await response.json();

                // Show bot reply
                appendMessage(data.response, "bot-message");

            }

            catch(error){

                appendMessage("Server error!", "bot-message");

                console.log(error);

            }

        }

    </script>

</body>
</html>
