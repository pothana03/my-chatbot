<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy Chatbot</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 600px;
            background: #16213e;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .chat-header {
            background: #0f3460;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

            .chat-header span {
                color: #e94560;
            }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            color: white;
            word-wrap: break-word;
        }

        .user-message {
            background: #e94560;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: #0f3460;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-input {
            display: flex;
            padding: 16px;
            background: #0f3460;
            gap: 10px;
        }

            .chat-input input {
                flex: 1;
                padding: 12px 16px;
                border: none;
                border-radius: 25px;
                background: #1a1a2e;
                color: white;
                font-size: 14px;
                outline: none;
            }

            .chat-input button {
                padding: 12px 20px;
                background: #e94560;
                color: white;
                border: none;
                border-radius: 25px;
                cursor: pointer;
                font-size: 14px;
                font-weight: bold;
            }

                .chat-input button:hover {
                    background: #c73652;
                }
    </style>
</head>

<body>

    <div class="chat-container">

        <div class="chat-header">
            🤖 <span>Buddy</span> AI Assistant
        </div>

        <div class="chat-messages" id="chatMessages">

            <div class="message bot-message">
                Hi! I'm Buddy. How can I help you today?
            </div>

        </div>

        <div class="chat-input">

            <input type="text"
                   id="userInput"
                   placeholder="Type a message..." />

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

    <script>

    const input = document.getElementById("userInput");

    const messages = document.getElementById("chatMessages");


    input.addEventListener("keypress", function(e){

        if(e.key === "Enter"){
            sendMessage();
        }

    });


    async function sendMessage(){

        const userText = input.value.trim();

        if(!userText) return;


        // USER MESSAGE
        appendMessage(userText, "user-message");

        input.value = "";


        // CREATE EMPTY BOT MESSAGE
        const botDiv = document.createElement("div");

        botDiv.className = "message bot-message";

        botDiv.textContent = "";

        messages.appendChild(botDiv);

        messages.scrollTop = messages.scrollHeight;


        // SEND TO BACKEND
        const response = await fetch("/chat", {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                message:userText
            })

        });


        // STREAM RESPONSE
        const reader = response.body.getReader();

        const decoder = new TextDecoder();


        while(true){

            const {done, value} = await reader.read();

            if(done) break;

            const chunk = decoder.decode(value);

            botDiv.textContent += chunk;

            messages.scrollTop = messages.scrollHeight;
        }

    }


    function appendMessage(text, className){

        const div = document.createElement("div");

        div.className = `message ${className}`;

        div.textContent = text;

        messages.appendChild(div);

        messages.scrollTop = messages.scrollHeight;
    }

    </script>

</body>
</html>
